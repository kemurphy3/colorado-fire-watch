services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: firewatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: firewatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingest:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:firewatch@db:5432/firewatch
      FIRMS_API_KEY: ${FIRMS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
